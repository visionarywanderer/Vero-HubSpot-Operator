# ============================================================================
# HubSpot RevOps Integration Pro — Skill Manifest
# ============================================================================
# This file declares metadata, capabilities, guardrails, anti-patterns, and
# testing guidance for the hubspot-revops-integration-pro skill.
# ============================================================================

# --------------------------------------------------------------------------
# 1. METADATA
# --------------------------------------------------------------------------
metadata:
  name: hubspot-revops-integration-pro
  version: "1.0.0"
  description: >
    Expert-level HubSpot CRM integration skill covering OAuth & private-app
    authentication, full CRM object CRUD (contacts, companies, deals, tickets,
    custom objects), associations v4, properties, workflow automation (v3/v4),
    batch operations, webhooks, rate-limit management, and anti-pattern
    detection. Targets Node.js and Python SDK consumers.
  author: Vero HubSpot Operator
  license: Apache-2.0
  tags:
    - hubspot
    - crm
    - revops
    - oauth
    - webhooks
    - automation
    - integrations
    - node
    - python

# --------------------------------------------------------------------------
# 2. CAPABILITIES
# --------------------------------------------------------------------------
capabilities:
  oauth_authentication:
    description: "Implement OAuth 2.0 authorization flows for multi-account HubSpot apps"

  private_app_authentication:
    description: "Configure private-app static tokens for single-account integrations"

  contacts_crud:
    description: "Create, read, update, delete, and upsert contact records (single & batch)"

  companies_crud:
    description: "Create, read, update, delete company records and manage parent/child hierarchies"

  deals_crud:
    description: "Create, read, update, delete deal records with pipeline and stage management"

  tickets_crud:
    description: "Create, read, update, delete ticket records within support pipelines"

  custom_objects:
    description: "Define schemas and manage records for custom CRM object types (Enterprise)"

  properties_management:
    description: "Create, read, update custom properties and property groups on any CRM object"

  associations_v4:
    description: "Create, read, delete labeled and unlabeled associations between CRM records"

  batch_operations:
    description: "Execute bulk create, read, update, upsert, and archive via batch endpoints"

  crm_search:
    description: "Query CRM records with filters, sorts, and pagination via the Search API"

  webhooks_setup:
    description: "Configure webhook subscriptions, verify signatures, and handle event delivery"

  polling_reconciliation:
    description: "Implement polling strategies for data not covered by webhooks (e.g., email events)"

  workflow_automation_v4:
    description: "Create, read, update, and delete workflows via the v4 Automation API"

  workflow_automation_v3_legacy:
    description: "Read and maintain legacy v3 workflows (migration guidance to v4)"

  rate_limit_management:
    description: "Implement exponential backoff, caching, and request budgeting"

  anti_pattern_detection:
    description: "Identify and remediate common HubSpot integration mistakes in user code"

  lifecycle_stage_management:
    description: "Correctly set and clear lifecycle stages respecting forward-only progression"

  pipeline_stage_management:
    description: "Use internal IDs for deal/ticket pipeline stages, never display names"

# --------------------------------------------------------------------------
# 3. DEPENDENCIES
# --------------------------------------------------------------------------
dependencies:
  runtime:
    node: ">=18.0.0"
    typescript: ">=5.0.0"     # optional but recommended
    python: ">=3.9"           # if using Python SDK

  npm_packages:
    - name: "@hubspot/api-client"
      version: ">=12.0.0"
      notes: "Official HubSpot Node.js SDK; v9+ required for associations v4"
    - name: "axios"
      version: ">=1.6.0"
      notes: "Fallback HTTP client when SDK doesn't cover an endpoint"
    - name: "bottleneck"
      version: ">=2.19.0"
      notes: "Client-side rate limiter; recommended for burst control"
    - name: "dotenv"
      version: ">=16.0.0"
      notes: "Load environment variables from .env files"

  pip_packages:
    - name: "hubspot-api-client"
      version: ">=9.0.0"
      notes: "Official HubSpot Python SDK"
    - name: "requests"
      version: ">=2.31.0"
      notes: "Fallback HTTP client for raw API calls"

